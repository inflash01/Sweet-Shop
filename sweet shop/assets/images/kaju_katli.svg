<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5DEB3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D2B48C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Diamond shape -->
  <polygon points="100,30 150,100 100,170 50,100" fill="url(#silverGrad)" stroke="#8B7500" stroke-width="2"/>
  
  <!-- Inner diamond -->
  <polygon points="100,50 130,100 100,150 70,100" fill="#FFE4B5" opacity="0.6"/>
  
  <!-- Texture -->
  <circle cx="100" cy="100" r="3" fill="#8B7500" opacity="0.5"/>
  <circle cx="80" cy="80" r="2" fill="#8B7500" opacity="0.5"/>
  <circle cx="120" cy="120" r="2" fill="#8B7500" opacity="0.5"/>
  <circle cx="120" cy="80" r="2" fill="#8B7500" opacity="0.5"/>
  <circle cx="80" cy="120" r="2" fill="#8B7500" opacity="0.5"/>
  
  <!-- Shine effect -->
  <ellipse cx="80" cy="80" rx="15" ry="15" fill="rgba(255,255,255,0.3)"/>
</svg>