<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="jalebiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DAA520;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Spiral jalebi -->
  <circle cx="100" cy="80" r="25" fill="none" stroke="url(#jalebiGrad)" stroke-width="8"/>
  <circle cx="100" cy="80" r="18" fill="none" stroke="url(#jalebiGrad)" stroke-width="8" opacity="0.9"/>
  <circle cx="100" cy="95" r="22" fill="none" stroke="url(#jalebiGrad)" stroke-width="8" opacity="0.85"/>
  
  <!-- Syrup shine -->
  <ellipse cx="85" cy="70" rx="12" ry="8" fill="rgba(255,255,255,0.3)"/>
  
  <!-- Crispness marks -->
  <path d="M 70 80 Q 65 85 70 90" stroke="#8B7500" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 130 75 Q 135 80 130 85" stroke="#8B7500" stroke-width="1" fill="none" opacity="0.5"/>
  
  <!-- Syrup dripping -->
  <ellipse cx="100" cy="125" rx="20" ry="30" fill="url(#jalebiGrad)" opacity="0.6"/>
  <path d="M 90 140 Q 85 155 88 170" stroke="#FFD700" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 110 140 Q 115 155 112 170" stroke="#FFD700" stroke-width="2" fill="none" opacity="0.7"/>
  
