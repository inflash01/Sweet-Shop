<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dryfruit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Almonds -->
  <ellipse cx="70" cy="60" rx="15" ry="25" fill="#D2691E" transform="rotate(-20 70 60)"/>
  <ellipse cx="120" cy="70" rx="12" ry="22" fill="#A0522D" transform="rotate(25 120 70)"/>
  <ellipse cx="85" cy="130" rx="14" ry="24" fill="#8B4513" transform="rotate(-15 85 130)"/>
  
  <!-- Cashews -->
  <path d="M 100 90 Q 110 100 105 115" fill="#DAA520" stroke="#8B7500" stroke-width="2"/>
  <path d="M 130 110 Q 135 120 125 130" fill="#FFD700" stroke="#8B7500" stroke-width="2"/>
  
  <!-- Pistachios -->
  <circle cx="60" cy="100" r="8" fill="#6B8E23"/>
  <circle cx="140" cy="90" r="7" fill="#7CB342"/>
  
  <!-- Decorative dots -->
  <circle cx="50" cy="80" r="3" fill="#FFD700" opacity="0.7"/>
  <circle cx="150" cy="120" r="3" fill="#FFD700" opacity="0.7"/>
  
  <!-- Shadow -->
  <ellipse cx="100" cy="160" rx="50" ry="8" fill="rgba(0,0,0,0.2)"/>
</svg>