<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="festivalGift" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6347;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main box -->
  <rect x="40" y="70" width="120" height="80" fill="url(#festivalGift)" stroke="#8B0000" stroke-width="2" rx="4"/>
  
  <!-- Diwali pattern - diyas -->
  <circle cx="60" cy="90" r="6" fill="#FF4500"/>
  <circle cx="100" cy="85" r="6" fill="#FF4500"/>
  <circle cx="140" cy="90" r="6" fill="#FF4500"/>
  
  <!-- Ribbon -->
  <rect x="45" y="60" width="110" height="6" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
  <polygon points="100,55 95,65 105,65" fill="#FFD700"/>
  
  <!-- Decorative pattern -->
  <path d="M 60 110 L 70 105 L 80 110 L 90 105 L 100 110 L 110 105 L 120 110 L 130 105 L 140 110" stroke="#FF4500" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- Shine -->
  <ellipse cx="55" cy="80" rx="18" ry="20" fill="rgba(255,255,255,0.25)"/>
  
  <!-- Shadow -->
  <ellipse cx="100" cy="155" rx="60" ry="10" fill="rgba(0,0,0,0.2)"/>
</svg>