<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="slide1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#slide1Grad)"/>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="15" fill="rgba(255,255,255,0.1)"/>
  <circle cx="350" cy="250" r="20" fill="rgba(255,255,255,0.1)"/>
  <circle cx="380" cy="50" r="12" fill="rgba(255,255,255,0.1)"/>
  
  <!-- Sweet illustration -->
  <g transform="translate(300, 150)">
    <!-- Kaju Katli -->
    <polygon points="0,-30 40,0 0,30 -40,0" fill="#FFD700" stroke="#8B7500" stroke-width="2"/>
    <polygon points="0,-20 25,0 0,20 -25,0" fill="#FFED4E" opacity="0.6"/>
    
    <!-- Mysore Pak -->
    <rect x="-50" y="10" width="50" height="40" fill="#FFB74D" rx="3"/>
    <line x1="-50" y1="20" x2="0" y2="20" stroke="#8B7500" stroke-width="1" opacity="0.5"/>
    <line x1="-50" y1="30" x2="0" y2="30" stroke="#8B7500" stroke-width="1" opacity="0.5"/>
  </g>
</svg>