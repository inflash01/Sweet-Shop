<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Gift hamper box -->
  <rect x="30" y="60" width="140" height="100" fill="#CD5C5C" stroke="#8B3A3A" stroke-width="2" rx="5"/>
  
  <!-- Handle -->
  <path d="M 60 60 Q 100 20 140 60" fill="none" stroke="#DAA520" stroke-width="4"/>
  <path d="M 60 60 Q 100 30 140 60" fill="none" stroke="#FFD700" stroke-width="2"/>
  
  <!-- Decorative items inside -->
  <circle cx="65" cy="85" r="8" fill="#FFD700"/>
  <circle cx="100" cy="80" r="8" fill="#8B4513"/>
  <circle cx="135" cy="88" r="8" fill="#DAA520"/>
  
  <!-- Ribbon bow -->
  <ellipse cx="100" cy="55" rx="12" ry="8" fill="#FF69B4"/>
  <circle cx="88" cy="45" r="6" fill="#FF69B4"/>
  <circle cx="112" cy="45" r="6" fill="#FF69B4"/>
  
  <!-- Shine -->
  <ellipse cx="50" cy="75" rx="15" ry="20" fill="rgba(255,255,255,0.2)"/>
  
  <!-- Shadow -->
  <ellipse cx="100" cy="165" rx="60" ry="10" fill="rgba(0,0,0,0.2)"/>
</svg>