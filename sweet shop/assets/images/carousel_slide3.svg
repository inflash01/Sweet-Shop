<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="slide3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#slide3Grad)"/>
  
  <!-- Gift box illustration -->
  <g transform="translate(280, 140)">
    <!-- Box body -->
    <rect x="-30" y="-25" width="60" height="50" fill="#E83B3B" stroke="#8B0000" stroke-width="2"/>
    
    <!-- Lid -->
    <rect x="-35" y="-35" width="70" height="12" fill="#FF6B6B" stroke="#8B0000" stroke-width="2"/>
    
    <!-- Ribbon -->
    <rect x="-3" y="-40" width="6" height="90" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
    <polygon points="0,-42 -8,-32 8,-32" fill="#FFD700"/>
    
    <!-- Bow -->
    <ellipse cx="-10" cy="-25" rx="6" ry="4" fill="#FFD700"/>
    <ellipse cx="10" cy="-25" rx="6" ry="4" fill="#FFD700"/>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="80" cy="100" r="8" fill="rgba(255,255,255,0.15)"/>
  <circle cx="120" cy="60" r="6" fill="rgba(255,255,255,0.15)"/>
</svg>