<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="rasmalaiGrad" cx="40%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#FFFACD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0E68C;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Malai (cream) base -->
  <ellipse cx="100" cy="85" rx="45" ry="40" fill="url(#rasmalaiGrad)"/>
  
  <!-- Cheese dumpling -->
  <circle cx="100" cy="65" r="22" fill="#FFFACD" stroke="#F0E68C" stroke-width="2"/>
  
  <!-- Syrup pool -->
  <ellipse cx="100" cy="130" rx="50" ry="25" fill="#FFE4B5" opacity="0.6"/>
  <path d="M 60 130 Q 50 135 55 145" stroke="#FFE4B5" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 140 130 Q 150 135 145 145" stroke="#FFE4B5" stroke-width="2" fill="none" opacity="0.5"/>
  
  <!-- Cardamom accent -->
  <circle cx="75" cy="110" r="4" fill="#DAA520"/>
  <circle cx="125" cy="115" r="4" fill="#DAA520"/>
  
  <!-- Shine -->
  <ellipse cx="85" cy="55" rx="12" ry="10" fill="rgba(255,255,255,0.4)"/>
  
  <!-- Shadow -->
  <ellipse cx="100" cy="155" rx="50" ry="8" fill="rgba(0,0,0,0.15)"/>
</svg>