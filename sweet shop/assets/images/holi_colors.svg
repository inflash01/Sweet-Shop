<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="holiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6C1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#holiGrad)"/>
  
  <!-- Color powder splashes -->
  <circle cx="60" cy="60" r="20" fill="#FF69B4" opacity="0.7"/>
  <circle cx="140" cy="70" r="25" fill="#00CED1" opacity="0.7"/>
  <circle cx="80" cy="130" r="22" fill="#32CD32" opacity="0.7"/>
  <circle cx="130" cy="120" r="20" fill="#FF6347" opacity="0.7"/>
  
  <!-- Powder cloud effect -->
  <ellipse cx="100" cy="90" rx="30" ry="25" fill="#FFD700" opacity="0.5"/>
  
  <!-- Splash details -->
  <path d="M 70 70 Q 60 75 65 85" fill="#FF1493" opacity="0.6"/>
  <path d="M 130 85 Q 145 80 140 95" fill="#00CED1" opacity="0.6"/>
  
  <!-- Festive elements -->
  <polygon points="100,30 105,40 115,38 107,45 112,55 100,50 88,55 93,45 85,38 95,40" fill="#FFD700"/>
  
  <!-- Color drops -->
  <circle cx="40" cy="100" r="4" fill="#FF69B4"/>
  <circle cx="160" cy="110" r="5" fill="#00CED1"/>
  <circle cx="50" cy="150" r="4" fill="#32CD32"/>
</svg>