<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="corporateGift" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Premium box -->
  <rect x="40" y="65" width="120" height="85" fill="url(#corporateGift)" stroke="#1A252F" stroke-width="2" rx="3"/>
  
  <!-- Metallic stripe -->
  <rect x="40" y="65" width="120" height="8" fill="#DAA520" stroke="#8B7500" stroke-width="1"/>
  
  <!-- Logo area (embossed look) -->
  <rect x="55" y="85" width="90" height="50" fill="rgba(255,255,255,0.05)" rx="2"/>
  
  <!-- Simple corporate pattern -->
  <line x1="65" y1="100" x2="135" y2="100" stroke="#DAA520" stroke-width="1.5" opacity="0.6"/>
  <line x1="65" y1="110" x2="135" y2="110" stroke="#DAA520" stroke-width="1.5" opacity="0.6"/>
  <line x1="65" y1="120" x2="135" y2="120" stroke="#DAA520" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Ribbon accent -->
  <rect x="94" y="55" width="12" height="95" fill="#DAA520" opacity="0.7"/>
  
  <!-- Bow -->
  <ellipse cx="85" cy="52" rx="8" ry="6" fill="#DAA520"/>
  <ellipse cx="115" cy="52" rx="8" ry="6" fill="#DAA520"/>
  
  <!-- Shine on lid -->
  <ellipse cx="55" cy="73" rx="25" ry="8" fill="rgba(255,255,255,0.1)"/>
  
  <!-- Shadow -->
  <ellipse cx="100" cy="160" rx="60" ry="10" fill="rgba(0,0,0,0.25)"/>
</svg>