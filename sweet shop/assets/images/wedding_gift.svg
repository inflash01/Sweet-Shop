<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="weddingGift" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6C1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Tiered gift box -->
  <rect x="35" y="100" width="130" height="60" fill="#FF69B4" stroke="#C71585" stroke-width="2" rx="3"/>
  <rect x="45" y="70" width="110" height="40" fill="#FFB6C1" stroke="#C71585" stroke-width="2" rx="3"/>
  <rect x="55" y="45" width="90" height="35" fill="#FFD700" stroke="#DAA520" stroke-width="2" rx="3"/>
  
  <!-- Decorative elements -->
  <circle cx="65" cy="62" r="5" fill="#8B4513"/>
  <circle cx="100" cy="58" r="5" fill="#8B4513"/>
  <circle cx="135" cy="65" r="5" fill="#8B4513"/>
  
  <!-- Top bow -->
  <ellipse cx="85" cy="35" rx="10" ry="8" fill="#FF1493"/>
  <ellipse cx="115" cy="35" rx="10" ry="8" fill="#FF1493"/>
  <circle cx="100" cy="30" r="5" fill="#FF69B4"/>
  
  <!-- Ribbon accent -->
  <rect x="95" y="35" width="10" height="120" fill="#DAA520" opacity="0.6"/>
  
  <!-- Shine -->
  <ellipse cx="50" cy="80" rx="20" ry="25" fill="rgba(255,255,255,0.25)"/>
  
  <!-- Shadow -->
  <ellipse cx="100" cy="165" rx="65" ry="10" fill="rgba(0,0,0,0.2)"/>
</svg>