<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="kheerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5DEB3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D2B48C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main fudge block -->
  <rect x="45" y="60" width="110" height="90" fill="url(#kheerGrad)" rx="5"/>
  
  <!-- Rice grain pattern -->
  <rect x="50" y="65" width="3" height="8" fill="#A0826D" transform="rotate(10 51.5 69)"/>
  <rect x="70" y="70" width="3" height="8" fill="#A0826D" transform="rotate(-15 71.5 74)"/>
  <rect x="90" y="68" width="3" height="8" fill="#A0826D" transform="rotate(20 91.5 72)"/>
  <rect x="110" y="72" width="3" height="8" fill="#A0826D" transform="rotate(-10 111.5 76)"/>
  <rect x="130" y="70" width="3" height="8" fill="#A0826D" transform="rotate(15 131.5 74)"/>
  
  <!-- Cardamom/spice dots -->
  <circle cx="60" cy="100" r="3" fill="#8B4513" opacity="0.7"/>
  <circle cx="100" cy="95" r="2.5" fill="#8B4513" opacity="0.7"/>
  <circle cx="140" cy="105" r="3" fill="#8B4513" opacity="0.7"/>
  <circle cx="75" cy="130" r="2.5" fill="#8B4513" opacity="0.7"/>
  <circle cx="125" cy="125" r="3" fill="#8B4513" opacity="0.7"/>
  
  <!-- Shine -->
  <ellipse cx="65" cy="75" rx="18" ry="12" fill="rgba(255,255,255,0.25)"/>
  
  <!-- Shadow -->
  <ellipse cx="100" cy="160" rx="55" ry="8" fill="rgba(0,0,0,0.2)"/>
</svg>