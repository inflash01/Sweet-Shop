<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="diwaliGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6347;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#diwaliGrad)"/>
  
  <!-- Diwali diyas -->
  <g transform="translate(50, 60)">
    <ellipse cx="0" cy="10" rx="12" ry="15" fill="#FF4500"/>
    <circle cx="0" cy="-5" r="4" fill="#FFD700"/>
  </g>
  
  <g transform="translate(100, 50)">
    <ellipse cx="0" cy="10" rx="12" ry="15" fill="#FF4500"/>
    <circle cx="0" cy="-5" r="4" fill="#FFD700"/>
  </g>
  
  <g transform="translate(150, 65)">
    <ellipse cx="0" cy="10" rx="12" ry="15" fill="#FF4500"/>
    <circle cx="0" cy="-5" r="4" fill="#FFD700"/>
  </g>
  
  <!-- Fireworks pattern -->
  <circle cx="70" cy="120" r="20" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.6"/>
  <circle cx="130" cy="130" r="18" fill="none" stroke="#FF69B4" stroke-width="2" opacity="0.6"/>
  
  <!-- Sparkles -->
  <line x1="50" y1="100" x2="60" y2="110" stroke="#FFD700" stroke-width="2"/>
  <line x1="140" y1="90" x2="150" y2="100" stroke="#FFD700" stroke-width="2"/>
  <line x1="75" y1="155" x2="85" y2="165" stroke="#FF69B4" stroke-width="2"/>
</svg>