<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="pedaGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#DAA520;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B4513;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Main lump shape -->
  <circle cx="100" cy="95" r="45" fill="url(#pedaGrad)"/>
  
  <!-- Top knot/ridge -->
  <ellipse cx="100" cy="55" rx="20" ry="15" fill="#8B4513" opacity="0.7"/>
  
  <!-- Texture crumbles -->
  <circle cx="70" cy="75" r="3" fill="#8B4513" opacity="0.5"/>
  <circle cx="130" cy="80" r="3" fill="#8B4513" opacity="0.5"/>
  <circle cx="85" cy="120" r="2.5" fill="#8B4513" opacity="0.5"/>
  <circle cx="115" cy="125" r="2.5" fill="#8B4513" opacity="0.5"/>
  
  <!-- Ghee shine effect -->
  <ellipse cx="75" cy="70" rx="20" ry="18" fill="rgba(255,255,255,0.3)"/>
  
  <!-- Crackle pattern -->
  <line x1="80" y1="85" x2="85" y2="90" stroke="#654321" stroke-width="1" opacity="0.4"/>
  <line x1="115" y1="95" x2="120" y2="100" stroke="#654321" stroke-width="1" opacity="0.4"/>
  
  <!-- Shadow -->
  <ellipse cx="100" cy="145" rx="48" ry="10" fill="rgba(0,0,0,0.2)"/>
</svg>