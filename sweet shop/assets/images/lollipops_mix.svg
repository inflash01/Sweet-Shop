<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="100%" height="100%" fill="#fff6f0"/>
  <!-- lollipop 1 -->
  <g transform="translate(50,60)">
    <circle cx="60" cy="60" r="40" fill="#ff6b9d" />
    <circle cx="60" cy="60" r="24" fill="#fff" />
    <rect x="56" y="100" width="8" height="120" rx="4" fill="#cfa" transform="rotate(10 60 160)" />
  </g>
  <!-- lollipop 2 -->
  <g transform="translate(180,40)">
    <circle cx="60" cy="60" r="44" fill="#ffd166" />
    <circle cx="60" cy="60" r="20" fill="#fff" />
    <rect x="58" y="104" width="6" height="132" rx="3" fill="#cfa" transform="rotate(-10 60 160)" />
  </g>
  <text x="50%" y="350" text-anchor="middle" fill="#7a4a3a" font-family="Segoe UI, Arial" font-size="20">Lollipops Mix</text>
</svg>