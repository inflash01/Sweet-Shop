<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="100%" height="100%" fill="#f9e7d9"/>
  <!-- gummy bears colorful shapes -->
  <g transform="translate(30,70)">
    <g fill="#ff6b6b">
      <ellipse cx="60" cy="70" rx="34" ry="44"/>
      <circle cx="60" cy="40" r="18"/>
    </g>
    <g transform="translate(90,0)" fill="#ffcc4d">
      <ellipse cx="60" cy="70" rx="34" ry="44"/>
      <circle cx="60" cy="40" r="18"/>
    </g>
    <g transform="translate(180,0)" fill="#69c9a2">
      <ellipse cx="60" cy="70" rx="34" ry="44"/>
      <circle cx="60" cy="40" r="18"/>
    </g>
  </g>
  <text x="50%" y="350" text-anchor="middle" fill="#6b4a3a" font-family="Segoe UI, Arial" font-size="20">Gummy Bears</text>
</svg>