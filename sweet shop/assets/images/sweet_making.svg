<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="makingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D2B48C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B4513;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#makingGrad)"/>
  
  <!-- Mixing bowl -->
  <path d="M 50 80 Q 50 50 100 50 Q 150 50 150 80 Z" fill="#FFA07A" stroke="#8B4513" stroke-width="2"/>
  
  <!-- Bowl interior shadow -->
  <ellipse cx="100" cy="75" rx="45" ry="20" fill="rgba(0,0,0,0.1)"/>
  
  <!-- Mixing spoon -->
  <line x1="100" y1="65" x2="100" y2="140" stroke="#8B4513" stroke-width="4"/>
  <ellipse cx="100" cy="145" rx="12" ry="8" fill="#D2691E"/>
  
  <!-- Ingredients -->
  <circle cx="70" cy="105" r="6" fill="#FFD700"/>
  <circle cx="90" cy="115" r="5" fill="#8B7500"/>
  <circle cx="110" cy="110" r="6" fill="#DAA520"/>
  <circle cx="130" cy="120" r="5" fill="#FFD700"/>
  
  <!-- Ghee/liquid element -->
  <ellipse cx="100" cy="95" rx="30" ry="12" fill="#FFE4B5" opacity="0.6"/>
  
  <!-- Steam wisps -->
  <path d="M 80 50 Q 75 40 80 30" stroke="#FFE4B5" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 100 48 Q 98 35 102 25" stroke="#FFE4B5" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 120 50 Q 125 38 120 28" stroke="#FFE4B5" stroke-width="2" fill="none" opacity="0.7"/>
</svg>