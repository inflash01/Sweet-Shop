<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="jaggeryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main block -->
  <rect x="40" y="60" width="120" height="90" fill="url(#jaggeryGrad)" rx="8"/>
  
  <!-- Top highlight -->
  <rect x="40" y="60" width="120" height="15" fill="#A0522D" opacity="0.6" rx="8"/>
  
  <!-- Texture pattern -->
  <line x1="50" y1="80" x2="150" y2="80" stroke="#654321" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="100" x2="150" y2="100" stroke="#654321" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="120" x2="150" y2="120" stroke="#654321" stroke-width="1" opacity="0.5"/>
  
  <!-- Side facets -->
  <polygon points="40,150 30,145 30,160 40,165" fill="rgba(0,0,0,0.2)"/>
  
  <!-- Shine effect -->
  <ellipse cx="60" cy="75" rx="20" ry="10" fill="rgba(255,255,255,0.2)"/>
  
  <!-- Shadow -->
  <ellipse cx="100" cy="160" rx="55" ry="10" fill="rgba(0,0,0,0.25)"/>
</svg>